<!DOCTYPE html>
<html class="no-js" lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reports and Publications</title>

  <link rel="stylesheet" href="https://wet-boew.github.io/themes-dist/GCWeb/GCWeb/css/theme.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="container">
  <h1 id="wb-cont">Reports and Publications</h1>
  <p>Browse reports and publications using filters or search.</p>

  <div class="row">

    <!-- FILTERS -->
    <div class="col-md-3 push-down">
      <aside>
        <details open>
          <summary class="bg-primary text-center">Filter options</summary>

          <form class="mrgn-lft-md mrgn-rght-md">
            <div class="row mrgn-tp-lg mrgn-bttm-lg">

              <div class="form-group">
                <label for="filterType">Type:</label>
                <select id="filterType" class="form-control">
                  <option value="">All types</option>
                </select>
              </div>

              <div class="form-group">
                <label>Date of publication (Year Range):</label>
                <div class="year-range-container">
                  <div class="year-input-group">
                    <label for="filterYearStart" class="year-label">From:</label>
                    <select id="filterYearStart" class="form-control year-select">
                    </select>
                  </div>
                  <div class="year-input-group">
                    <label for="filterYearEnd" class="year-label">To:</label>
                    <select id="filterYearEnd" class="form-control year-select">
                    </select>
                  </div>
                </div>
              </div>

              <div class="col-md-12 mrgn-tp-lg">
                <button type="button" class="btn btn-default" id="resetFilters">
                  Reset Filters
                </button>
              </div>

            </div>
          </form>
        </details>
      </aside>
    </div>

    <!-- CONTENT -->
    <div class="col-md-9">

      <!-- SEARCH -->
      <div class="search-bar-wrapper mrgn-bttm-md">
        <div class="form-group">
          <label for="searchOperations">Search reports:</label>
          <input id="searchOperations" type="text" class="form-control"
                 placeholder="Type to search reports">
        </div>
      </div>

      <!-- CARDS -->
      <div class="cards-container">
      </div>

      <!-- PAGINATION -->
      <div class="mrgn-tp-lg text-center">
        <gcds-pagination
          id="gcds-pagination"
          label="Pagination"
          total-pages="1"
          current-page="1">
        </gcds-pagination>
      </div>

    </div>

  </div>
</main>

<script type="module" src="https://cdn.design-system.alpha.canada.ca/gcds-components/gcds-components.esm.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="script.js"></script>
</body>
</html>
